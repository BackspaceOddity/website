<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1200">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/fonts.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1200px;
      height: 630px;
      background: #F5F2E9;
      font-family: 'SouvenirGothic', Georgia, serif;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 80px 80px 60px;
      overflow: hidden;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .logo img {
      height: 90px;
      width: auto;
    }
    .logo-text {
      font-family: 'SouvenirGothic', Georgia, serif;
      font-weight: 700;
      font-size: 44px;
      color: #011C00;
      letter-spacing: -0.02em;
    }
    .headline {
      font-family: 'SouvenirGothic', Georgia, serif;
      font-weight: 700;
      font-size: 76px;
      line-height: 0.9;
      letter-spacing: -0.03em;
      color: #011C00;
      max-width: 1040px;
    }
    .subtitle {
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 28px;
      color: #011C00;
      opacity: 0.5;
      letter-spacing: -0.02em;
    }
  </style>
</head>
<body>
  <div class="logo">
    <img src="assets/images/Logo Mark.svg" alt="">
    <span class="logo-text">Backspace Oddity</span>
  </div>
  <div>
    <h1 class="headline">Product got you traction. Brand is your moat in the AI era</h1>
  </div>
</body>
</html>
